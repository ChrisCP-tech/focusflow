<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0D17" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FocusFlow" />
  <meta name="description" content="Your ADHD-friendly squad planner" />
  <title>FocusFlow 🧠</title>
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <style>
    body { margin: 0; background: #0B0D17; color-scheme: dark; }
    #root { min-height: 100vh; }
    select, option { background: #1A1D2E !important; color: #E8E9F3 !important; }
    select:focus { outline: 1px solid rgba(108,99,255,0.5); }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); }
  </style>
</head>
<body>
  <noscript>You need JavaScript to run FocusFlow.</noscript>
  <div id="root"></div>
</body>
</html>
